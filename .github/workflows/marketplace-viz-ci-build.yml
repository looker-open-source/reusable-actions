name: viz-ci-build
on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version to use (default: 20)'
        required: false
        default: '20'
        type: string
      run-tests:
        description: 'Whether to run tests (yarn test)'
        required: false
        default: false
        type: boolean
      run-lint:
        description: 'Whether to run linter (yarn lint)'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Repo checkout
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache

      - name: Run linter
        if: ${{ inputs.run-lint }}
        run: yarn lint

      - name: Run tests
        if: ${{ inputs.run-tests }}
        run: yarn test

      - name: Build/bundle
        run: yarn build
